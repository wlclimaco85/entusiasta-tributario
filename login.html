<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Entusiasta Tributário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">$</div>
      <h1>entusiasta <span>tributário</span></h1>
      <p style="font-size:0.85rem;color:var(--cinza-texto);margin-top:6px">Acesse o painel de administração</p>
    </div>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <input type="password" id="senha" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" id="btn-submit">
        Entrar
      </button>
    </form>

    <div style="text-align:center;margin-top:20px">
      <a href="index.html" style="font-size:0.85rem;color:var(--cinza-texto)">← Voltar para o site</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Redireciona se já logado
  if (Auth.isLoggedIn()) window.location.href = 'admin.html';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';
    btn.textContent = 'Entrando...';
    btn.disabled = true;

    try {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const res = await AuthAPI.login(email, senha);

      if (res?.data?.token || res?.token) {
        const token = res?.data?.token || res?.token;
        // Extrai usuário de diferentes formatos de resposta
        const user = res?.data?.login || res?.data?.user || res?.login || res?.user || { email };
        Auth.setToken(token);
        Auth.setUser(user);
        window.location.href = 'admin.html';
      } else {
        throw new Error('Credenciais inválidas');
      }
    } catch (err) {
      errEl.textContent = 'E-mail ou senha incorretos. Verifique suas credenciais.';
      errEl.style.display = 'block';
      btn.textContent = 'Entrar';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
