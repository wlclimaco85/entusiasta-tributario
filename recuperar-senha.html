<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha — Entusiasta Tributário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">$</div>
      <h1>entusiasta <span>tributário</span></h1>
      <p style="font-size:0.85rem;color:var(--cinza-texto);margin-top:6px">Recuperar senha</p>
    </div>

    <div class="login-error" id="rec-error"></div>
    <div id="rec-success" style="display:none;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#22c55e;padding:10px 14px;border-radius:var(--radius);font-size:0.85rem;margin-bottom:16px"></div>

    <div id="rec-form-wrap">
      <p style="font-size:0.85rem;color:var(--cinza-texto);margin-bottom:20px">
        Informe seu e-mail cadastrado. Você receberá uma senha temporária.
      </p>
      <form id="rec-form">
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" id="btn-submit">
          Recuperar senha
        </button>
      </form>
    </div>

    <div style="text-align:center;margin-top:20px">
      <a href="login.html" style="font-size:0.85rem;color:var(--cinza-texto)">← Voltar para o login</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  document.getElementById('rec-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('btn-submit');
    const errEl = document.getElementById('rec-error');
    const okEl  = document.getElementById('rec-success');
    errEl.style.display = 'none';
    okEl.style.display  = 'none';
    btn.textContent = 'Enviando...';
    btn.disabled = true;

    const email = document.getElementById('email').value.trim();

    try {
      const res = await fetch(`${API_BASE}/rest/auth/recuperar-senha`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        errEl.textContent = data?.message || 'Erro ao processar solicitação.';
        errEl.style.display = 'block';
        return;
      }

      document.getElementById('rec-form-wrap').style.display = 'none';
      okEl.innerHTML = `✅ ${data?.message || 'Solicitação enviada!'}<br>
        ${data?.senhaTemp ? `<br><strong>Senha temporária:</strong> <code style="background:#1a1a1a;padding:2px 8px;border-radius:4px;color:#22c55e">${data.senhaTemp}</code><br><small style="color:#888">Altere sua senha após o primeiro acesso.</small>` : ''}`;
      okEl.style.display = 'block';

    } catch (err) {
      errEl.textContent = 'Erro de conexão: ' + err.message;
      errEl.style.display = 'block';
    } finally {
      btn.textContent = 'Recuperar senha';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
